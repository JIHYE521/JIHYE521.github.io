<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>My To-do List</title>
		<link rel="stylesheet" href="./style.css" />
		<script src="https://kit.fontawesome.com/d1ca41e896.js" crossorigin="anonymous"></script>
		<script src="main.js" defer></script>
	</head>
	<body>
		<div class="wrap">
			<header class="header">
				<h1>* TO DO LIST *</h1>
				<div class="btns">
					<button class="filter-done">완료된 목록보기</button>
					<button class="filter-undone">미완료된 목록보기</button>
					<button class="delete-all">전체삭제</button>
					<button class="delete-done">완료삭제</button>
				</div>
			</header>

			<ul class="list"> </ul>
			<footer class="footer">
				<form action="" class="form">
					<input type="text" class="form__input" placeholder="텍스트를 입력하세요." />
					<button type="submit" class="form__btn"><i class="fa-solid fa-plus"></i></button
				></form>
			</footer>
		</div>
	</body>
</html>
